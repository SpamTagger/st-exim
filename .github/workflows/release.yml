name: Build and Release .deb Packages

on:
  push:
    tags:
      - "*" # run only on tags
    workflow_dispatch:

permissions:
  contents: write
  # packages: write
  # issues: write
  # id-token: write

jobs:
  build:
    name: Build (${{ matrix.deb_arch }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        deb_arch: [amd64, arm64]

    env:
      PKG_NAME: st-exim

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Derive release version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU # For ARM64 on AMD64
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run build script
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          chmod +x ./build_and_extract.sh
          ./build_and_extract.sh $VERSION /home/runner/debs ${{ matrix.deb_arch }}

      - name: Define package path
        id: pkg
        run: |
          PKG_PATH="/home/runner/debs/${PKG_NAME}-${{ steps.version.outputs.version }}_${{ matrix.deb_arch }}.deb"
          echo "path=$PKG_PATH" >> "$GITHUB_OUTPUT"

      - name: Verify package exists
        run: |
          ls -lh "${{ steps.pkg.outputs.path }}"

      - name: Verify package installs on Debian Stable
        run: |
          docker run --rm \
            --platform=linux/${{ matrix.deb_arch }} \
            -v /home/runner/debs:/debs:ro \
            debian:stable \
            bash -euxc "
              apt-get update
              apt-get install -qq -y /debs/${PKG_NAME}-${{ steps.version.outputs.version }}_${{ matrix.deb_arch }}.deb
            "

      - name: Upload package as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.deb_arch }}
          path: ${{ steps.pkg.outputs.path }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-22.04

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Generate SHA256 checksums
        run: |
          cd dist
          find . -name "*.deb" -print0 | xargs -0 sha256sum > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          name: st-exim ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/**/st-exim-*.deb
            dist/SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
